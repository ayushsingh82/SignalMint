<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="np-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="np-cyan" cx="25%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="np-magenta" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="np-bottom" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <filter id="np-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="32"/>
    </filter>
    <pattern id="np-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#38bdf8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" fill="url(#np-bg)"/>
  <rect width="1200" height="1200" fill="url(#np-grid)"/>
  <ellipse cx="300" cy="360" rx="400" ry="360" fill="url(#np-cyan)" filter="url(#np-blur)"/>
  <ellipse cx="1020" cy="300" rx="320" ry="280" fill="url(#np-magenta)" filter="url(#np-blur)"/>
  <ellipse cx="600" cy="1150" rx="650" ry="350" fill="url(#np-bottom)" filter="url(#np-blur)"/>
  <circle cx="600" cy="600" r="280" fill="none" stroke="#22d3ee" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="600" cy="600" r="420" fill="none" stroke="#e879f9" stroke-opacity="0.06" stroke-width="1"/>
</svg>
