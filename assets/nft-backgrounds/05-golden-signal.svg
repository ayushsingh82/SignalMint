<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="gs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="gs-gold" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gs-accent" cx="0%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="gs-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="35"/>
    </filter>
    <linearGradient id="gs-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcd34d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#gs-bg)"/>
  <ellipse cx="600" cy="420" rx="500" ry="400" fill="url(#gs-gold)" filter="url(#gs-blur)"/>
  <ellipse cx="120" cy="1080" rx="450" ry="350" fill="url(#gs-accent)" filter="url(#gs-blur)"/>
  <line x1="100" y1="600" x2="1100" y2="580" stroke="url(#gs-line)" stroke-width="2"/>
  <line x1="150" y1="720" x2="1050" y2="700" stroke="url(#gs-line)" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="840" x2="1000" y2="820" stroke="url(#gs-line)" stroke-width="1" opacity="0.35"/>
</svg>
