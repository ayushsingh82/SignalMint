<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="ps-bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <radialGradient id="ps-violet" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#18181b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ps-rose" cx="90%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#18181b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ps-teal" cx="55%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#18181b" stop-opacity="0"/>
    </radialGradient>
    <filter id="ps-blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <linearGradient id="ps-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#ps-bg)"/>
  <ellipse cx="240" cy="360" rx="450" ry="400" fill="url(#ps-violet)" filter="url(#ps-blur)"/>
  <ellipse cx="1080" cy="480" rx="400" ry="450" fill="url(#ps-rose)" filter="url(#ps-blur)"/>
  <ellipse cx="660" cy="1080" rx="500" ry="300" fill="url(#ps-teal)" filter="url(#ps-blur)"/>
  <rect width="1200" height="1200" fill="url(#ps-shine)"/>
</svg>
